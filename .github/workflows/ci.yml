name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: cargo test
        run: cargo test --workspace --all-targets --locked
      - name: cargo test (doc)
        run: cargo test --workspace --doc --locked

  functional-linux:
    name: Functional tests (Linux + VeraCrypt)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: functional-linux

      - name: Install VeraCrypt + FUSE
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq software-properties-common fuse libfuse2 wget
          sudo add-apt-repository -y ppa:unit193/encryption
          sudo apt-get update -qq
          sudo apt-get install -y -qq veracrypt
          veracrypt --text --version

      - name: Allow loop devices
        run: |
          sudo modprobe loop || true
          ls -l /dev/loop* | head -5

      - name: Build picrypt binaries
        run: cargo build --release --locked -p picrypt-server -p picrypt-client

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync functional test deps
        working-directory: functional-tests
        run: uv sync --locked

      - name: Run functional tests
        working-directory: functional-tests
        env:
          LOG_LEVEL: INFO
        run: uv run python entry.py
